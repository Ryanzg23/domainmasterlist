<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h2>Domain Manager</h2>
    <ul>
      <li>Dashboard</li>
      <li>Domains</li>
      <li>Admin</li>
    </ul>
  </aside>

  <main class="main">
    <div class="controls">
      <div class="filter-group">
        <label>Brand</label>
        <select id="brandFilter"></select>
      </div>
      
      <div class="filter-group">
        <label>Category</label>
        <select id="categoryFilter">
          <option>All</option>
          <option>Aged</option>
          <option>KW</option>
          <option>MS</option>
          <option>Mirror</option>
          <option>AMP</option>
          <option>ALT</option>
          <option>Spinwheel</option>
          <option>RTP</option>
          <option>Shorturl</option>
          <option>Ads</option>
        </select>
      </div>
      
      <div class="filter-group">
        <label>Type</label>
        <select id="typeFilter">
          <option>All Domains</option>
          <option>Primary</option>
          <option>Subdomain</option>
          <option>Inner folder</option>
        </select>
      </div>

      <input type="text" id="search" placeholder="Search domain...">

      <button id="addBtn">+ Add Domain</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Assignee</th>
          <th>Brand</th>
          <th>Category</th>
          <th>Domain</th>
          <th>Status</th>
          <th>Hosting</th>
          <th>Cloudflare</th>
          <th>Marketing</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </main>
</div>

<!-- Detail Modal -->
<div class="modal" id="detailModal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script src="script.js"></script>
</body>
</html>
