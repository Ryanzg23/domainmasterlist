<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h2>Domain Manager</h2>
    <ul>
      <li>Dashboard</li>
      <li>Domains</li>
      <li>Admin</li>
      <li><button onclick="logout()">Logout</button></li>
    </ul>
  </aside>

  <main class="main">
    <div class="controls">
      <div class="filter-group">
        <label>Brand</label>
        <select id="brandFilter"></select>
      </div>
      
      <div class="filter-group">
        <label>Category</label>
        <select id="categoryFilter">
          <option>All</option>
          <option>Aged</option>
          <option>KW</option>
          <option>MS</option>
          <option>Mirror</option>
          <option>AMP</option>
          <option>ALT</option>
          <option>Spinwheel</option>
          <option>RTP</option>
          <option>Shorturl</option>
          <option>Ads</option>
        </select>
      </div>
      
      <div class="filter-group">
        <label>Type</label>
        <select id="typeFilter">
          <option>All Domains</option>
          <option>Primary</option>
          <option>Subdomain</option>
          <option>Inner Folder</option>
        </select>
      </div>

      <input type="text" id="search" placeholder="Search domain...">
      <div class="table-controls">
      
        <div class="entries-control">
          <label>Show</label>
          <select id="rowsPerPageSelect">
            <option value="15">15</option>
            <option value="25" selected>25</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
          <span>entries</span>
        </div>
      
        <input type="text" id="search" placeholder="Search domains">
      
      </div>

      <button id="addBtn">+ Add Domain</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Assignee</th>
          <th>Brand</th>
          <th>Category</th>
          <th>Domain</th>
          <th>Status</th>
          <th>Hosting</th>
          <th>Cloudflare</th>
          <th>Marketing</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="pagination"></div>
  </main>
</div>

<!-- Detail Modal -->
<div class="modal" id="detailModal">
  <div class="modal-content" id="modalContent"></div>
</div>

  
<div class="login-modal" id="loginModal">
  <div class="login-box">

    <h2>Domain Manager</h2>
    <p class="login-sub">Login to continue</p>

    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">

    <button id="loginBtn">Login</button>

    <p id="loginError"></p>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
