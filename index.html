<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain Dashboard</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#f3f4f6; }
.app { display:flex; height:100vh; }
.sidebar { width:240px; background:#1f2937; color:#fff; padding:20px; }
.sidebar h2 { margin-bottom:20px; }
.sidebar ul { list-style:none; padding:0; }
.sidebar li { padding:10px 0; cursor:pointer; }
.main { flex:1; padding:20px; overflow:auto; }
.controls { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.controls select, .controls input { padding:8px; border-radius:6px; border:1px solid #ccc; }
button { padding:8px 12px; border:none; border-radius:6px; background:#3b82f6; color:#fff; cursor:pointer; }
table { width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; }
th, td { padding:12px; border-bottom:1px solid #eee; text-align:left; }
tr:hover { background:#f9fafb; cursor:pointer; }
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; }
.modal-content { background:#fff; padding:20px; border-radius:10px; width:500px; max-height:80vh; overflow:auto; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h2>Domain Manager</h2>
    <ul>
      <li>Dashboard</li>
      <li>Domains</li>
      <li>Admin</li>
    </ul>
  </aside>

  <main class="main">
    <div class="controls">
      <select id="brandFilter"></select>
      <select id="categoryFilter">
        <option>All</option>
        <option>Aged</option>
        <option>KW</option>
        <option>MS</option>
        <option>Mirror</option>
        <option>AMP</option>
        <option>ALT</option>
        <option>Spinwheel</option>
        <option>RTP</option>
        <option>Shorturl</option>
        <option>Ads</option>
      </select>
      <select id="typeFilter">
        <option>All Domains</option>
        <option>Primary</option>
        <option>Subdomain</option>
        <option>Inner folder</option>
      </select>
      <input type="text" id="search" placeholder="Search domain...">
      <button onclick="openAddModal()">+ Add Domain</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Assignee</th>
          <th>Brand</th>
          <th>Domain</th>
          <th>Hosting</th>
          <th>Cloudflare</th>
          <th>Marketing</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </main>
</div>

<div class="modal" id="detailModal">
  <div class="modal-content" id="modalContent"></div>
</div>

<div class="modal" id="addModal">
  <div class="modal-content">
    <h3>Add Domain</h3>
    <input id="domainName" placeholder="Domain Name"><br><br>
    <select id="domainType">
      <option>Primary</option>
      <option>Subdomain</option>
      <option>Inner folder</option>
    </select><br><br>
    <input id="assignee" placeholder="Assignee"><br><br>
    <input id="brand" placeholder="Brand"><br><br>
    <button onclick="addDomain()">Save</button>
  </div>
</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1E7iKMXB8tgSCJBHKBX-LOvIuJzKdRO2eZhuAyTWArZGnX5_8bU-reZg_a8oI7oppN4lXH-439WXI/pub?output=csv";

let data = [];

async function loadData(){
  const res = await fetch(sheetURL);
  const text = await res.text();
  const rows = text.split("\n").map(r => r.split(","));

  const headers = rows[0];
  data = rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h,i)=> obj[h.trim()] = r[i]);
    return obj;
  });

  populateBrands();
  renderTable();
}

function populateBrands(){
  const brands = [...new Set(data.map(d=>d.Brand))];
  const select = document.getElementById("brandFilter");
  select.innerHTML = '<option>All</option>' + brands.map(b=>`<option>${b}</option>`).join("");
}

function renderTable(){
  const tbody = document.getElementById("tableBody");
  const search = document.getElementById("search").value.toLowerCase();
  const brand = document.getElementById("brandFilter").value;
  const type = document.getElementById("typeFilter").value;
  const category = document.getElementById("categoryFilter").value;

  const filtered = data.filter(d => {
    return (
      (!search || d["Domain Name"].toLowerCase().includes(search)) &&
      (brand === "All" || d.Brand === brand) &&
      (type === "All Domains" || d["Domain Type"] === type) &&
      (category === "All" || d.Category === category)
    );
  });

  tbody.innerHTML = filtered.map(d => `
    <tr onclick='openDetail(${JSON.stringify(d)})'>
      <td>${d["Date Created"]||""}</td>
      <td>${d.Assignee||""}</td>
      <td>${d.Brand||""}</td>
      <td>${d["Domain Name"]||""}</td>
      <td>${d.Hosting||""}</td>
      <td>${d.Cloudflare||""}</td>
      <td>${d.Marketing||""}</td>
    </tr>
  `).join("");
}

function openDetail(d){
  const modal = document.getElementById("detailModal");
  const content = document.getElementById("modalContent");

  content.innerHTML = Object.entries(d).map(([k,v]) => `<p><b>${k}</b>: ${v}</p>`).join("");
  modal.style.display = "flex";
}

window.onclick = function(e){
  if(e.target.classList.contains("modal")){
    e.target.style.display = "none";
  }
}

function openAddModal(){
  document.getElementById("addModal").style.display = "flex";
}

function addDomain(){
  const newDomain = {
    "Domain Name": document.getElementById("domainName").value,
    "Domain Type": document.getElementById("domainType").value,
    "Assignee": document.getElementById("assignee").value,
    "Brand": document.getElementById("brand").value
  };

  data.push(newDomain);
  renderTable();
  document.getElementById("addModal").style.display = "none";
}

['search','brandFilter','typeFilter','categoryFilter'].forEach(id=>{
  document.getElementById(id).addEventListener('input', renderTable);
});

loadData();
</script>
</body>
</html>
